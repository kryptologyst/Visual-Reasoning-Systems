# @package model

_target_: src.models.visualbert.VisualBERTModel

name: "visualbert"
pretrained_model: "uclanlp/visualbert-nlvr2"
num_labels: 2
hidden_size: 768
num_attention_heads: 12
num_hidden_layers: 12
